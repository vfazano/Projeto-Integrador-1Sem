<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Integrador</title>
    <link rel="stylesheet" href="./login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
   
</head>

<body>
    <div class="top-bar"></div>

    <main>
        <div class="page-header">
            <h1>Projeto Integrador</h1>
            <p>1º Semestre - SENAI</p>
        </div>

        <div class="card">
            <form method="POST">
                <!-- Email -->
                <div class="field">
                    <label class="field-label" for="email">Email</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">alternate_email</span>
                        <input id="email" name="email" type="email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <!-- Senha -->
                <div class="field">
                    <label class="field-label" for="senha">Senha</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined input-icon">lock</span>
                        <input id="senha" name="senha" type="password" placeholder="••••••••" required class="has-toggle">
                        <button id="toggleSenha" type="button" class="toggle-senha" aria-label="Mostrar senha">
                            <span class="material-symbols-outlined" id="iconSenha">visibility_off</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <div class="card-footer">
                <p>Esqueceu sua senha? <a href="esqueciSenha.html">Esqueci minha senha</a></p>
            </div>
        </div>
    </main>
    <script src="login.js"></script>

</body>

</html>
