<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Integrador</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004d99",
                        "primary-container": "#1565c0",
                        "on-primary": "#ffffff",
                        "on-surface": "#1a1c1c",
                        "on-surface-variant": "#424752",
                        "surface": "#f9f9f9",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-high": "#e8e8e8",
                        "outline": "#727783"
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>

<body class="bg-surface-container-lowest flex items-center justify-center min-h-screen p-6">
    <main class="w-full max-w-[420px] animate-in fade-in zoom-in duration-700">
        <div class="mb-10 text-center">
            <h1 class="text-on-surface font-bold text-3xl">Projeto Integrador</h1>
            <p class="text-on-surface-variant text-sm mt-2">1º Semestre - SENAI</p>
        </div>

        <div class="bg-surface-container-low p-8 rounded-xl shadow-lg">
            <form class="space-y-6" method="POST">
                <div class="space-y-2">
                    <label class="block text-xs font-bold tracking-wider text-on-surface-variant uppercase"
                        for="email">Email</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">
                            alternate_email
                        </span>
                        <input
                            class="w-full bg-surface-container-high border-none rounded-lg py-3 pl-10 pr-4 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/50"
                            id="email" name="email" placeholder="seu@email.com" required type="email">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold tracking-wider text-on-surface-variant uppercase"
                        for="senha">Senha</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">
                            lock
                        </span>
                        <input
                            class="w-full bg-surface-container-high border-none rounded-lg py-3 pl-10 pr-12 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline/50"
                            id="senha" name="senha" placeholder="••••••••" required type="password">
                        <button id="toggleSenha" type="button" aria-label="Mostrar senha"
                            class="absolute right-2 top-1/2 -translate-y-1/2 text-outline hover:text-primary focus:outline-none">
                            <span class="material-symbols-outlined" id="iconSenha">visibility_off</span>
                        </button>
                    </div>
                </div>

                <button class="w-full bg-primary-container hover:bg-primary text-on-primary font-bold py-3 rounded-lg shadow-lg transition-all active:scale-95"
                    type="submit">
                    Entrar
                </button>
            </form>

            <div class="mt-6 text-end flex-col ">
                <p class="text-on-surface-variant text-sm">Esqueceu sua senha?</p> <a href="esqueciSenha.html"
                        class="text-primary font-semibold hover:underline">Esqueci minha senha</a></p>
            </div>
        </div>
    </main>

    <div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container"></div>

    <script>
        const senhaInput = document.getElementById('senha');
        const toggleSenhaBtn = document.getElementById('toggleSenha');
        const iconSenha = document.getElementById('iconSenha');

        toggleSenhaBtn.addEventListener('click', () => {
            const isPassword = senhaInput.type === 'password';
            senhaInput.type = isPassword ? 'text' : 'password';
            iconSenha.textContent = isPassword ? 'visibility' : 'visibility_off';
            toggleSenhaBtn.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
        });
    </script>
</body>

</html>
